<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0">
  <title>Finom – More</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #d8dde0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .screen {
      width: 375px;
      background: #eef1f2;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Status bar ───────────────────────────────────────────── */
    .status-bar {
      background: #eef1f2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 12px 20px;
      height: 44px;
    }
    .status-time {
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #242424;
      letter-spacing: -0.165px;
    }
    .status-icons { display: flex; align-items: center; gap: 7px; }

    /* ── Page header ──────────────────────────────────────────── */
    .page-header {
      padding: 8px 16px 16px;
    }
    .page-title {
      font-size: 28px;
      font-weight: 600;
      color: #242424;
      line-height: 34px;
    }

    /* ── Profile card ─────────────────────────────────────────── */
    .profile-card {
      background: #fff;
      border-radius: 20px;
      margin: 0 16px 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name {
      font-size: 17px;
      font-weight: 600;
      color: #242424;
      line-height: 22px;
    }
    .profile-email {
      font-size: 13px;
      font-weight: 400;
      color: rgba(36,47,51,0.64);
      line-height: 18px;
    }
    .chev { flex-shrink: 0; }

    /* ── Content ──────────────────────────────────────────────── */
    .content {
      padding: 0 16px 110px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Menu card ────────────────────────────────────────────── */
    .menu-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
    }
    .menu-section-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(36,47,51,0.64);
      padding: 14px 16px 6px;
    }
    .menu-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
    }
    .menu-row + .menu-row {
      border-top: 1px solid rgba(36,47,51,0.06);
    }
    .menu-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .menu-icon.blue    { background: rgba(26,122,255,0.12); }
    .menu-icon.green   { background: rgba(47,168,79,0.12); }
    .menu-icon.purple  { background: rgba(155,89,182,0.12); }
    .menu-icon.orange  { background: rgba(245,166,35,0.12); }
    .menu-icon.teal    { background: rgba(37,78,92,0.12); }
    .menu-icon.red     { background: rgba(231,76,60,0.12); }
    .menu-icon.gray    { background: rgba(37,78,92,0.08); }
    .menu-label {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      color: #242424;
      line-height: 20px;
    }
    .menu-badge {
      background: #e74c3c;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      border-radius: 10px;
      padding: 2px 7px;
      line-height: 14px;
    }

    /* ── App version ──────────────────────────────────────────── */
    .app-version {
      text-align: center;
      font-size: 11px;
      color: rgba(36,47,51,0.35);
      padding: 8px 0;
    }

    /* ── Bottom navigation ────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 375px;
      height: 86px;
      background: linear-gradient(to bottom, rgba(238,241,242,0) 0%, #eef1f2 55%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 0;
      pointer-events: none;
    }
    .tab-bar-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: all;
    }
    .tab-bar {
      background: rgba(36, 36, 36, 0.94);
      border-radius: 40px;
      height: 58px;
      display: flex;
      width: 274px;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 7px 0 2px;
      cursor: pointer;
      text-decoration: none;
    }
    .tab-icon { width: 24px; height: 24px; opacity: 0.6; }
    .tab-icon svg { width: 100%; height: 100%; }
    .tab.active .tab-icon { opacity: 1; }
    .tab-label {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      line-height: 10px;
    }
    .tab.active .tab-label { color: #fff; }
    .ai-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(150deg, rgba(169,142,242,0.3) 12%, rgba(254,66,180,0.3) 78%);
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 9px 16px rgba(0,0,0,0.09);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>

<script>
(function () {
  var ctx = { currentScreen: 'more' };

  var emailEl = document.querySelector('.profile-email');
  if (emailEl) ctx.userEmail = emailEl.textContent.trim();

  var nameEl = document.querySelector('.profile-name');
  if (nameEl) ctx.companyName = nameEl.textContent.trim();

  var badgeEl = document.querySelector('.menu-badge');
  if (badgeEl) ctx.pendingApprovals = parseInt(badgeEl.textContent, 10) || 0;

  FinomAI.AppContext.update(ctx);

  document.querySelector('.ai-btn').addEventListener('click', function () {
    window.location.href = 'ai.html';
  });
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0">
  <title>Finom – AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/ai-icon.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @view-transition { navigation: auto; }
    ::view-transition-group(ai-btn) { animation-duration: 300ms; animation-timing-function: ease-in-out; }
    ::view-transition-old(ai-btn) { animation: 300ms ease-in-out both vt-ai-exit; }
    ::view-transition-new(ai-btn) { animation: none; opacity: 0; }
    @keyframes vt-ai-exit { to { opacity: 0; transform: scale(0.6); } }

    body {
      background: #F6F6F6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .device-frame {
      width: 375px;
      height: 812px;
      border-radius: 32px;
      border: 2px solid #1a1a1a;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.12);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      transform: translateZ(0);
    }

    .screen {
      width: 375px;
      background: #fff;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ai.html: chat fills the frame exactly */
    .device-frame .screen {
      height: 812px;
    }

    /* ── Status bar ───────────────────────────────────────────── */
    .status-bar {
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 12px 20px;
      height: 44px;
      flex-shrink: 0;
    }
    .status-time {
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #242424;
      letter-spacing: -0.165px;
    }
    .status-icons { display: flex; align-items: center; gap: 7px; }

    /* ── Nav top (close button row) ───────────────────────────── */
    .nav-top {
      background: #fff;
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(37, 78, 92, 0.12);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Chat top menu ────────────────────────────────────────── */
    .chat-top-menu {
      background: #fff;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(37, 78, 92, 0.12);
      box-shadow: 0px 1px 3px rgba(0,0,0,0.03), 0px 8px 12px rgba(0,0,0,0.02);
      flex-shrink: 0;
    }
    .chat-title {
      font-size: 17px;
      font-weight: 500;
      color: #242424;
      line-height: 1;
    }
    .chat-menu-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .chat-menu-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: #242424;
      position: relative;
    }

    /* ── History badge (unread counter) ──────────────────────── */
    .chat-menu-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      background: #fe42b4;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      line-height: 1;
      pointer-events: none;
    }

    /* ── Chat area ────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }

    /* ── Welcome state ────────────────────────────────────────── */
    .welcome-state {
      display: flex;
      flex-direction: column;
    }
    .welcome-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .welcome-greeting-text {
      font-size: 18px;
      font-weight: 400;
      color: #000;
      line-height: 22px;
      text-align: center;
      max-width: 248px;
    }

    /* ── Prompt sections ──────────────────────────────────────── */
    .prompt-section {
      margin-top: 20px;
    }
    .prompt-section-label {
      font-size: 13px;
      font-weight: 400;
      color: rgba(36, 47, 51, 0.64);
      line-height: 20px;
      margin-bottom: 8px;
    }
    .prompt-cards-scroll {
      display: flex;
      flex-direction: row;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .prompt-cards-scroll::-webkit-scrollbar { display: none; }

    .prompt-card {
      background: #fff;
      border: none;
      border-radius: 14px;
      width: 141.5px;
      min-width: 141.5px;
      height: 68px;
      padding: 0 15px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #242424;
      line-height: 15px;
      text-align: left;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.05), 0px 8px 12px rgba(0,0,0,0.03);
      transition: background 0.15s;
      display: flex;
      align-items: center;
    }
    .prompt-card--gradient-228 {
      background: linear-gradient(228.33deg, rgb(243, 238, 250) 30.155%, rgb(251, 248, 255) 105.17%);
      box-shadow: none;
    }
    .prompt-card--gradient-220 {
      background: linear-gradient(219.92deg, rgb(243, 238, 250) 30.155%, rgb(251, 248, 255) 105.17%);
      box-shadow: none;
    }
    .prompt-card--gradient-232 {
      background: linear-gradient(232.50deg, rgb(243, 238, 250) 30.155%, rgb(251, 248, 255) 105.17%);
      box-shadow: none;
    }
    .prompt-card--wide {
      width: 190px;
      min-width: 190px;
    }
    .prompt-card--medium {
      width: 122px;
      min-width: 122px;
    }
    .prompt-card:active { background: rgba(37, 78, 92, 0.04); }

    /* ── Chat messages ────────────────────────────────────────── */
    .chat-msg { display: flex; }
    .chat-msg--user { justify-content: flex-end; }
    .chat-msg--assistant { justify-content: flex-start; }
    .chat-msg--tool { justify-content: center; }

    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 20px;
      word-wrap: break-word;
    }
    .chat-bubble--user {
      background: #242424;
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .chat-bubble--assistant {
      background: #fff;
      color: #242424;
      border-bottom-left-radius: 6px;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.05), 0px 4px 8px rgba(0,0,0,0.03);
    }
    .chat-bubble--error {
      background: rgba(231,76,60,0.1);
      color: #e74c3c;
      border-bottom-left-radius: 6px;
    }

    /* ── Tool indicators ──────────────────────────────────────── */
    .tool-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(169,142,242,0.12);
      border-radius: 12px;
      padding: 6px 12px;
      font-size: 12px;
      color: rgba(36,47,51,0.64);
    }
    .tool-indicator__spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(169,142,242,0.3);
      border-top-color: #9b59b6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tool-result-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(47,168,79,0.1);
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 12px;
      color: #2fa84f;
    }

    /* ── Typing indicator ─────────────────────────────────────── */
    .chat-bubble--typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(36,47,51,0.25);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Rich content inside bubbles ──────────────────────────── */
    .rich-text {
      margin: 4px 0;
      font-size: 14px;
      line-height: 20px;
    }
    .rich-card {
      background: rgba(37,78,92,0.06);
      border-radius: 14px;
      padding: 12px;
      margin: 6px 0;
    }
    .rich-card__title {
      font-size: 14px;
      font-weight: 600;
      color: #242424;
      margin-bottom: 6px;
    }
    .rich-card__subtitle {
      font-size: 12px;
      color: rgba(36,47,51,0.64);
      margin-bottom: 6px;
    }
    .rich-card__field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .rich-card__field + .rich-card__field {
      border-top: 1px solid rgba(36,47,51,0.06);
    }
    .rich-card__field-label {
      font-size: 13px;
      color: rgba(36,47,51,0.64);
    }
    .rich-card__field-value {
      font-size: 13px;
      font-weight: 500;
      color: #242424;
    }

    .rich-list { margin: 6px 0; }
    .rich-list__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 0;
    }
    .rich-list__item + .rich-list__item {
      border-top: 1px solid rgba(36,47,51,0.06);
    }
    .rich-list__info { flex: 1; min-width: 0; }
    .rich-list__title {
      font-size: 13px;
      font-weight: 500;
      color: #242424;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rich-list__sub {
      font-size: 11px;
      color: rgba(36,47,51,0.45);
    }
    .rich-list__trailing {
      font-size: 13px;
      font-weight: 500;
      color: #242424;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rich-list__badge {
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .rich-link {
      display: inline-block;
      color: #1a7aff;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      margin: 4px 0;
    }

    .rich-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,78,92,0.1);
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #242424;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .rich-action:active { background: rgba(37,78,92,0.18); }

    /* ── Button group ──────────────────────────────────────────── */
    .rich-action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .rich-action-group .rich-action {
      font-size: 12px;
      padding: 6px 12px;
      margin-top: 0;
      border-radius: 20px;
      border: 1px solid rgba(37,78,92,0.1);
    }

    .rich-image {
      margin: 8px 0;
      border-radius: 12px;
      overflow: hidden;
    }
    .rich-image img {
      display: block;
      width: 100%;
      height: auto;
    }
    .rich-markdown {
      margin: 6px 0;
      font-size: 13px;
      line-height: 19px;
      color: #242424;
    }
    .rich-markdown__text {
      margin: 4px 0;
    }
    .rich-markdown__bullet {
      display: flex;
      gap: 8px;
      padding: 2px 0;
    }
    .rich-markdown__dot {
      color: rgba(36,47,51,0.45);
      flex-shrink: 0;
    }

    /* ── Composer ──────────────────────────────────────────────── */
    .composer {
      flex-shrink: 0;
      padding: 8px 16px 16px;
      background: #fff;
    }
    .composer-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid rgba(37, 78, 92, 0.16);
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.03), 0px 8px 12px rgba(0,0,0,0.02);
    }
    .attach-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: rgba(37, 78, 92, 0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #242424;
    }
    .composer-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      color: #242424;
      background: transparent;
      line-height: 20px;
    }
    .composer-input::placeholder { color: rgba(31, 46, 51, 0.4); }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: rgba(37, 78, 92, 0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: rgba(37, 78, 92, 0.4);
      transition: background 0.15s, color 0.15s;
    }
    .send-btn:not(:disabled) {
      background: #0b002e;
      color: #fff;
      cursor: pointer;
    }
    .send-btn:disabled {
      cursor: default;
    }
    .composer-disclaimer {
      font-size: 10px;
      color: rgba(31, 46, 51, 0.4);
      text-align: center;
      padding: 8px 0 4px;
      line-height: 14px;
    }

    /* ── History overlay ─────────────────────────────────────── */
    .history-overlay {
      position: absolute;
      inset: 0;
      background: #fff;
      z-index: 100;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .history-overlay.is-visible { display: flex; }

    .history-top-menu {
      background: #fff;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(37, 78, 92, 0.12);
      box-shadow: 0px 1px 3px rgba(0,0,0,0.03), 0px 8px 12px rgba(0,0,0,0.02);
      flex-shrink: 0;
    }
    .history-back {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .history-back-title {
      font-size: 17px;
      font-weight: 500;
      color: #242424;
      line-height: 1;
      font-family: 'Poppins', sans-serif;
    }
    .history-new-chat-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #242424;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
    }
    .history-section-divider {
      height: 1px;
      background: rgba(37, 78, 92, 0.12);
      margin: 12px 16px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:active { background: rgba(37, 78, 92, 0.04); }

    .history-item__info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-item__name {
      font-size: 15px;
      font-weight: 400;
      color: #242424;
      line-height: 24px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 1;
      min-width: 0;
    }
    .history-item__name--active {
      font-weight: 500;
    }
    .history-item__tag {
      background: rgba(74, 116, 255, 0.24);
      border-radius: 8px;
      padding: 3px 6px;
      font-size: 10px;
      font-weight: 500;
      color: #4a74ff;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .history-item__right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .history-item__badge {
      width: 8px;
      height: 8px;
      border-radius: 10px;
      background: #fe42b4;
    }
    .history-item__more {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #242424;
    }

    .history-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(36, 47, 51, 0.45);
      font-size: 14px;
    }
    .history-empty svg { opacity: 0.3; }

    /* ── Ghost AI button (view-transition target) ─────────── */
    /* .ai-btn-ghost styles live in css/ai-icon.css */

    /* ═══════════════════════════════════════════
       CARDS OVERLAY (bottom sheet)
       ═══════════════════════════════════════════ */

    .co-overlay {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none;
    }
    .co-overlay.is-open { pointer-events: all; }

    .co-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.4);
      cursor: pointer;
      opacity: 0;
      transition: opacity 300ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .co-overlay.is-open .co-backdrop { opacity: 1; }

    .co-peek-card {
      position: fixed; top: 32px; left: 50%;
      width: 351px; height: 40px;
      background: #d8dbdd;
      border-radius: 20px 20px 0 0;
      z-index: 201;
      will-change: transform;
      backface-visibility: hidden;
      transform: translateX(-50%) translate3d(0, 100vh, 0);
      transition: transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .co-overlay.is-open .co-peek-card {
      transform: translateX(-50%) translate3d(0, 0, 0);
    }

    .co-sheet {
      position: fixed; top: 42px; bottom: 0; left: 50%;
      width: 375px; background: #eef1f2;
      border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column;
      overflow: hidden; z-index: 202;
      will-change: transform;
      backface-visibility: hidden;
      transform: translateX(-50%) translate3d(0, 100vh, 0);
      transition: transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .co-overlay.is-open .co-sheet {
      transform: translateX(-50%) translate3d(0, 0, 0);
    }

    .co-header {
      background: transparent; height: 44px;
      display: flex; align-items: center; padding: 0 12px; flex-shrink: 0;
    }
    .co-close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(37, 78, 92, 0.08); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .co-body {
      flex: 1; overflow-y: auto; padding: 12px 16px 40px;
      display: flex; flex-direction: column; gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .co-section { background: #fff; border-radius: 20px; overflow: hidden; flex-shrink: 0; }

    .co-card-wrap { display: flex; justify-content: center; padding: 16px 16px 0; }
    .co-card {
      width: 278px; height: 174px; border-radius: 12px;
      background: linear-gradient(145deg, #e6e9ea 0%, #d0d5d6 55%, #e2e5e6 100%);
      box-shadow: 0 26px 14px -20px rgba(0, 0, 0, 0.1);
      position: relative; overflow: hidden; flex-shrink: 0;
      border: 1px solid rgba(81, 81, 81, 0.25);
    }
    .co-card::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 7px,
        rgba(255,255,255,0.14) 7px, rgba(255,255,255,0.14) 8px);
    }
    .co-card::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, transparent 55%);
    }
    .co-card__brand {
      position: absolute; top: 14px; left: 16px; z-index: 1;
      font-size: 21px; font-weight: 600; font-style: italic;
      color: #fe42b4; letter-spacing: -0.5px; line-height: 1;
    }
    .co-card__label-row {
      position: absolute; bottom: 44px; left: 16px; z-index: 1;
      display: flex; align-items: center; gap: 5px;
    }
    .co-card__label { font-size: 14px; font-weight: 400; color: #3a3a3a; line-height: 1; }
    .co-card__bottom {
      position: absolute; bottom: 14px; left: 16px; right: 16px; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
    }
    .co-card__number { font-size: 13px; color: #3a3a3a; letter-spacing: 0.5px; line-height: 1; }

  /* ── Open / Close ────────────────────────────── */

  function openCardsOverlay() {
    populatePrimeContent();
    lastFocused = document.activeElement;
    overlay.classList.add('is-open');
    overlay.setAttribute('aria-hidden', 'false');
    var pos = screen.scrollTop;
    setTimeout(function () {
      sheet.focus({ preventScroll: true });
      screen.scrollTop = pos;
    }, 50);
  }

  function closeCardsOverlay() {
    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden', 'true');
    if (lastFocused) {
      var pos = screen.scrollTop;
      lastFocused.focus({ preventScroll: true });
      screen.scrollTop = pos;
    }
  }

  /* ── Focus trap ──────────────────────────────── */

  function trapFocus(e) {
    if (!overlay.classList.contains('is-open')) return;
    var focusable = Array.prototype.slice.call(sheet.querySelectorAll(FOCUSABLE));
    if (!focusable.length) return;
    var first = focusable[0];
    var last  = focusable[focusable.length - 1];
    if (e.key === 'Tab') {
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
      }
    }
  }

  /* ── Wire event listeners ────────────────────── */

  backdrop.addEventListener('click', closeCardsOverlay);
  closeBtn.addEventListener('click', closeCardsOverlay);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && overlay.classList.contains('is-open')) closeCardsOverlay();
    trapFocus(e);
  });

  /* Listen for "View your Prime card" button click from message-renderer */
  document.addEventListener('finom:open_card_overlay', openCardsOverlay);
})();

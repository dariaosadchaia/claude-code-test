<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0">
  <title>Finom – AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #d8dde0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .screen {
      width: 375px;
      background: #fff;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Status bar ───────────────────────────────────────────── */
    .status-bar {
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 12px 20px;
      height: 44px;
      flex-shrink: 0;
    }
    .status-time {
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #242424;
      letter-spacing: -0.165px;
    }
    .status-icons { display: flex; align-items: center; gap: 7px; }

    /* ── Nav top (close button row) ───────────────────────────── */
    .nav-top {
      background: #fff;
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(37, 78, 92, 0.12);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Chat top menu ────────────────────────────────────────── */
    .chat-top-menu {
      background: #fff;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(37, 78, 92, 0.12);
      box-shadow: 0px 1px 3px rgba(0,0,0,0.03), 0px 8px 12px rgba(0,0,0,0.02);
      flex-shrink: 0;
    }
    .chat-title {
      font-size: 17px;
      font-weight: 500;
      color: #242424;
      line-height: 1;
    }
    .chat-menu-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .chat-menu-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: #242424;
    }

    /* ── Chat area ────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }

    /* ── Welcome state ────────────────────────────────────────── */
    .welcome-state {
      display: flex;
      flex-direction: column;
    }
    .welcome-row {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      margin-bottom: 4px;
    }
    .ai-icon {
      width: 32px;
      height: 32px;
      border-radius: 16.3px;
      background: linear-gradient(150.25deg, rgba(169, 142, 242, 0.13) 12.44%, rgba(254, 66, 180, 0.13) 78.41%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .welcome-greeting-text {
      font-size: 16px;
      font-weight: 400;
      color: #000;
      line-height: 22px;
      max-width: 283px;
    }

    /* ── Prompt sections ──────────────────────────────────────── */
    .prompt-section {
      margin-top: 20px;
    }
    .prompt-section-label {
      font-size: 13px;
      font-weight: 400;
      color: rgba(36, 47, 51, 0.64);
      line-height: 20px;
      margin-bottom: 8px;
    }
    .prompt-cards-scroll {
      display: flex;
      flex-direction: row;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .prompt-cards-scroll::-webkit-scrollbar { display: none; }

    .prompt-card {
      background: #fff;
      border: none;
      border-radius: 14px;
      width: 141.5px;
      min-width: 141.5px;
      height: 68px;
      padding: 0 15px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #242424;
      line-height: 15px;
      text-align: left;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.05), 0px 8px 12px rgba(0,0,0,0.03);
      transition: background 0.15s;
      display: flex;
      align-items: center;
    }
    .prompt-card--wide {
      width: 190px;
      min-width: 190px;
    }
    .prompt-card--medium {
      width: 122px;
      min-width: 122px;
    }
    .prompt-card:active { background: rgba(37, 78, 92, 0.04); }

    /* ── Chat messages ────────────────────────────────────────── */
    .chat-msg { display: flex; }
    .chat-msg--user { justify-content: flex-end; }
    .chat-msg--assistant { justify-content: flex-start; }
    .chat-msg--tool { justify-content: center; }

    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 20px;
      word-wrap: break-word;
    }
    .chat-bubble--user {
      background: #242424;
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .chat-bubble--assistant {
      background: #fff;
      color: #242424;
      border-bottom-left-radius: 6px;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.05), 0px 4px 8px rgba(0,0,0,0.03);
    }
    .chat-bubble--error {
      background: rgba(231,76,60,0.1);
      color: #e74c3c;
      border-bottom-left-radius: 6px;
    }

    /* ── Tool indicators ──────────────────────────────────────── */
    .tool-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(169,142,242,0.12);
      border-radius: 12px;
      padding: 6px 12px;
      font-size: 12px;
      color: rgba(36,47,51,0.64);
    }
    .tool-indicator__spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(169,142,242,0.3);
      border-top-color: #9b59b6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tool-result-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(47,168,79,0.1);
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 12px;
      color: #2fa84f;
    }

    /* ── Typing indicator ─────────────────────────────────────── */
    .chat-bubble--typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(36,47,51,0.25);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Rich content inside bubbles ──────────────────────────── */
    .rich-text {
      margin: 4px 0;
      font-size: 14px;
      line-height: 20px;
    }
    .rich-card {
      background: rgba(37,78,92,0.06);
      border-radius: 14px;
      padding: 12px;
      margin: 6px 0;
    }
    .rich-card__title {
      font-size: 14px;
      font-weight: 600;
      color: #242424;
      margin-bottom: 6px;
    }
    .rich-card__subtitle {
      font-size: 12px;
      color: rgba(36,47,51,0.64);
      margin-bottom: 6px;
    }
    .rich-card__field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .rich-card__field + .rich-card__field {
      border-top: 1px solid rgba(36,47,51,0.06);
    }
    .rich-card__field-label {
      font-size: 13px;
      color: rgba(36,47,51,0.64);
    }
    .rich-card__field-value {
      font-size: 13px;
      font-weight: 500;
      color: #242424;
    }

    .rich-list { margin: 6px 0; }
    .rich-list__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 0;
    }
    .rich-list__item + .rich-list__item {
      border-top: 1px solid rgba(36,47,51,0.06);
    }
    .rich-list__info { flex: 1; min-width: 0; }
    .rich-list__title {
      font-size: 13px;
      font-weight: 500;
      color: #242424;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rich-list__sub {
      font-size: 11px;
      color: rgba(36,47,51,0.45);
    }
    .rich-list__trailing {
      font-size: 13px;
      font-weight: 500;
      color: #242424;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rich-list__badge {
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .rich-link {
      display: inline-block;
      color: #1a7aff;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      margin: 4px 0;
    }

    .rich-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,78,92,0.1);
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #242424;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .rich-action:active { background: rgba(37,78,92,0.18); }

    /* ── Composer ──────────────────────────────────────────────── */
    .composer {
      flex-shrink: 0;
      padding: 8px 16px 16px;
      background: #fff;
    }
    .composer-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid rgba(37, 78, 92, 0.16);
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.03), 0px 8px 12px rgba(0,0,0,0.02);
    }
    .attach-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: rgba(37, 78, 92, 0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #242424;
    }
    .composer-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      color: #242424;
      background: transparent;
      line-height: 20px;
    }
    .composer-input::placeholder { color: rgba(31, 46, 51, 0.4); }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: rgba(37, 78, 92, 0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: rgba(37, 78, 92, 0.4);
      transition: background 0.15s, color 0.15s;
    }
    .send-btn:not(:disabled) {
      background: #0b002e;
      color: #fff;
      cursor: pointer;
    }
    .send-btn:disabled {
      cursor: default;
    }
    .composer-disclaimer {
      font-size: 10px;
      color: rgba(31, 46, 51, 0.4);
      text-align: center;
      padding: 8px 0 4px;
      line-height: 14px;
    }
  </style>
</head>
<body>
<div class="screen">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
        <rect x="0" y="7" width="3" height="4" rx="0.5" fill="#242424"/>
        <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#242424"/>
        <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#242424"/>
        <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#242424"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <circle cx="8" cy="10.5" r="1.3" fill="#242424"/>
        <path d="M4.5 7.5C5.6 6.2 6.7 5.6 8 5.6s2.4.6 3.5 1.9" stroke="#242424" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <path d="M1.5 4.5C3.2 2.4 5.5 1.2 8 1.2s4.8 1.2 6.5 3.3" stroke="#242424" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="21" height="12" rx="3.5" stroke="#242424" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="17" height="9" rx="2" fill="#242424"/>
        <path d="M23 4.5v4a2 2 0 000-4z" fill="#242424" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- NAV TOP (close button) -->
  <div class="nav-top">
    <button class="close-btn" id="back-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="#242424" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- CHAT TOP MENU -->
  <div class="chat-top-menu">
    <span class="chat-title">Assistant</span>
    <div class="chat-menu-icons">
      <!-- History / clock -->
      <div class="chat-menu-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="8.25" stroke="#242424" stroke-width="1.25"/>
          <path d="M12 8.5v3.75l2.25 2.25" stroke="#242424" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <!-- Edit / pencil -->
      <div class="chat-menu-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="#242424" stroke-width="1.25" stroke-linejoin="round"/>
        </svg>
      </div>
      <!-- More / ellipsis -->
      <div class="chat-menu-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="5.5" cy="12" r="1.5" fill="#242424"/>
          <circle cx="12" cy="12" r="1.5" fill="#242424"/>
          <circle cx="18.5" cy="12" r="1.5" fill="#242424"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">

    <!-- Welcome state -->
    <div class="welcome-state" id="welcome-state">

      <!-- Greeting row -->
      <div class="welcome-row">
        <div class="ai-icon">
          <svg width="16" height="18" viewBox="0 0 16 18" fill="none">
            <path d="M8 1.5l1.7 5H15l-4.2 3 1.6 5-4.4-2.8L3.6 14.5l1.6-5L1 6.5h5.3L8 1.5z" fill="rgba(169,142,242,0.65)" stroke="rgba(169,142,242,0.85)" stroke-width="0.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="welcome-greeting-text" id="welcome-greeting">Hello! Tell me what you want to achieve today</p>
      </div>

      <!-- Finom products -->
      <div class="prompt-section">
        <p class="prompt-section-label">Finom products</p>
        <div class="prompt-cards-scroll">
          <button class="suggestion-chip prompt-card" data-query="How can I get a loan on favorable terms?">How can I get a loan on favorable terms?</button>
          <button class="suggestion-chip prompt-card" data-query="How can I earn income from my savings?">How can I earn income from my savings?</button>
          <button class="suggestion-chip prompt-card" data-query="How can I accept payments via QR?">How can I accept payments via QR?</button>
        </div>
      </div>

      <!-- Your business -->
      <div class="prompt-section">
        <p class="prompt-section-label">Your business</p>
        <div class="prompt-cards-scroll">
          <button class="suggestion-chip prompt-card prompt-card--wide" data-query="Plan my 2026 budget by analyzing my expenses and making forecasts">Plan my 2026 budget by analyzing my expenses and making forecasts</button>
          <button class="suggestion-chip prompt-card prompt-card--medium" data-query="Where am I spending inefficiently?">Where am I spending inefficiently?</button>
          <button class="suggestion-chip prompt-card prompt-card--medium" data-query="How can I save money on cards?">How can I save money on cards?</button>
        </div>
      </div>

    </div>

  </div>

  <!-- COMPOSER -->
  <div class="composer">
    <div class="composer-inner">
      <button class="attach-btn">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M19 11.5l-8.5 8.5a5.5 5.5 0 01-7.8-7.8l9-9a3.67 3.67 0 015.2 5.2L7.8 17.5a1.83 1.83 0 01-2.6-2.6l7.8-7.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <input class="composer-input" id="composer-input" type="text" placeholder="Ask me anything..." autocomplete="off">
      <button class="send-btn" id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 13.5V4.5M4.5 9L9 4.5 13.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="composer-disclaimer">Assistant might make mistakes while the service is in beta</p>
  </div>

</div>

<script src="js/app-context.js"></script>
<script src="js/tool-registry.js"></script>
<script src="js/message-renderer.js"></script>
<script src="js/chat-engine.js"></script>
<script src="js/ai-app.js"></script>
</body>
</html>
